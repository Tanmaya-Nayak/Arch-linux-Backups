[manager]
keymap = [
  { on = "k",         run = "arrow -1",                        desc = "Up" },
  { on = "j",         run = "arrow 1",                         desc = "Down" },
  { on = "h",         run = "leave",                           desc = "Go to parent dir" },
  { on = "l",         run = "enter",                           desc = "Enter dir / open file" },
  { on = "<Up>",      run = "arrow -1",                        desc = "Up" },
  { on = "<Down>",    run = "arrow 1",                         desc = "Down" },
  { on = "<Left>",    run = "leave",                           desc = "Go to parent dir" },
  { on = "<Right>",   run = "enter",                           desc = "Enter dir / open file" },
  { on = "K",         run = "arrow -5",                        desc = "Jump up 5" },
  { on = "J",         run = "arrow 5",                         desc = "Jump down 5" },
  { on = "g",         run = "arrow -99999999",                 desc = "Go to top" },
  { on = "G",         run = "arrow 99999999",                  desc = "Go to bottom" },
  { on = "<Home>",    run = "arrow -99999999",                 desc = "Go to top" },
  { on = "<End>",     run = "arrow 99999999",                  desc = "Go to bottom" },
  { on = "<C-u>",     run = "arrow -50%",                      desc = "Half page up" },
  { on = "<C-d>",     run = "arrow 50%",                       desc = "Half page down" },
  { on = "<C-b>",     run = "arrow -100%",                     desc = "Full page up" },
  { on = "<C-f>",     run = "arrow 100%",                      desc = "Full page down" },
  { on = "t",         run = "tab_create --current",            desc = "New tab" },
  { on = "[",         run = "tab_switch -1 --relative",        desc = "Prev tab" },
  { on = "]",         run = "tab_switch 1 --relative",         desc = "Next tab" },
  { on = "1",         run = "tab_switch 0",                    desc = "Tab 1" },
  { on = "2",         run = "tab_switch 1",                    desc = "Tab 2" },
  { on = "3",         run = "tab_switch 2",                    desc = "Tab 3" },
  { on = "4",         run = "tab_switch 3",                    desc = "Tab 4" },
  { on = "5",         run = "tab_switch 4",                    desc = "Tab 5" },
  { on = "<Space>",   run = ["select --state=none", "arrow 1"],desc = "Toggle select" },
  { on = "v",         run = "visual_mode",                     desc = "Visual mode" },
  { on = "V",         run = "visual_mode --unset",             desc = "Visual unselect" },
  { on = "<C-a>",     run = "select_all --state=true",         desc = "Select all" },
  { on = "<C-r>",     run = "select_all --state=none",         desc = "Deselect all" },
  { on = "o",         run = "open",                            desc = "Open" },
  { on = "O",         run = "open --interactive",              desc = "Open with picker" },
  { on = "<Enter>",   run = "open",                            desc = "Open" },
  { on = "y",         run = "yank",                            desc = "Copy" },
  { on = "x",         run = "yank --cut",                      desc = "Cut" },
  { on = "p",         run = "paste",                           desc = "Paste" },
  { on = "P",         run = "paste --force",                   desc = "Paste (overwrite)" },
  { on = "d",         run = "remove",                          desc = "Trash" },
  { on = "D",         run = "remove --permanently",            desc = "Delete permanently" },
  { on = "a",         run = "create",                          desc = "Create" },
  { on = "r",         run = "rename --cursor=before_ext",      desc = "Rename" },
  { on = "R",         run = "rename --empty",                  desc = "Rename (clear)" },
  { on = ";",         run = "shell --interactive",             desc = "Shell command" },
  { on = "!",         run = "shell --block --interactive",     desc = "Shell (blocking)" },
  { on = ["s", "n"],  run = "sort natural --dir-first",        desc = "Sort: natural" },
  { on = ["s", "m"],  run = "sort modified --reverse",         desc = "Sort: modified" },
  { on = ["s", "s"],  run = "sort size --reverse",             desc = "Sort: size" },
  { on = ["s", "e"],  run = "sort extension --dir-first",      desc = "Sort: extension" },
  { on = ".",         run = "hidden toggle",                   desc = "Toggle hidden" },
  { on = "~",         run = "help",                            desc = "Help" },
  { on = "<Esc>",     run = "escape",                          desc = "Escape" },
  { on = "q",         run = "quit",                            desc = "Quit" },
  { on = "Q",         run = "quit --no-cwd-file",              desc = "Quit (no cd)" },
  { on = "/",         run = "find",                            desc = "Find" },
  { on = "n",         run = "find_arrow",                      desc = "Next match" },
  { on = "N",         run = "find_arrow --previous",           desc = "Prev match" },
  { on = "f",         run = "search fd",                       desc = "Search (fd)" },
  { on = "F",         run = "search rg",                       desc = "Search content" },
  { on = ["c", "c"],  run = "copy cell",                       desc = "Copy path" },
  { on = ["c", "d"],  run = "copy dirname",                    desc = "Copy dirname" },
  { on = ["c", "f"],  run = "copy filename",                   desc = "Copy filename" },
  { on = ["c", "n"],  run = "copy name_without_ext",           desc = "Copy name" },
  { on = ["g", "h"],  run = "cd ~",                            desc = "Go home" },
  { on = ["g", "c"],  run = "cd ~/.config",                    desc = "Go ~/.config" },
  { on = ["g", "d"],  run = "cd ~/Downloads",                  desc = "Go Downloads" },
  { on = ["g", "D"],  run = "cd ~/Documents",                  desc = "Go Documents" },
  { on = ["g", "p"],  run = "cd ~/Pictures",                   desc = "Go Pictures" },
  { on = ["g", "v"],  run = "cd ~/Videos",                     desc = "Go Videos" },
  { on = ["g", "m"],  run = "cd ~/Music",                      desc = "Go Music" },
  { on = ["g", "/"],  run = "cd /",                            desc = "Go /" },
  { on = ["g", "t"],  run = "cd /tmp",                         desc = "Go /tmp" },
]

[tasks]
keymap = [
  { on = "<Esc>", run = "close",    desc = "Close" },
  { on = "w",     run = "close",    desc = "Close" },
  { on = "k",     run = "arrow -1", desc = "Up" },
  { on = "j",     run = "arrow 1",  desc = "Down" },
]

[select]
keymap = [
  { on = "<Esc>",   run = "close",          desc = "Cancel" },
  { on = "<Enter>", run = "close --submit", desc = "Confirm" },
  { on = "k",       run = "arrow -1",       desc = "Up" },
  { on = "j",       run = "arrow 1",        desc = "Down" },
]

[input]
keymap = [
  { on = "<Enter>", run = "close --submit", desc = "Confirm" },
  { on = "<Esc>",   run = "close",          desc = "Cancel" },
  { on = "<C-a>",   run = "move --head",    desc = "Start of line" },
  { on = "<C-e>",   run = "move --tail",    desc = "End of line" },
  { on = "<C-u>",   run = "kill --head",    desc = "Kill to start" },
  { on = "<C-k>",   run = "kill --tail",    desc = "Kill to end" },
  { on = "<C-w>",   run = "kill --back-word", desc = "Kill prev word" },
  { on = "<BS>",    run = "backspace",      desc = "Backspace" },
  { on = "<Left>",  run = "move -1",        desc = "Left" },
  { on = "<Right>", run = "move 1",         desc = "Right" },
]

[help]
keymap = [
  { on = "<Esc>", run = "escape",   desc = "Close" },
  { on = "q",     run = "close",    desc = "Close" },
  { on = "k",     run = "arrow -1", desc = "Up" },
  { on = "j",     run = "arrow 1",  desc = "Down" },
  { on = "/",     run = "filter",   desc = "Filter" },
]
