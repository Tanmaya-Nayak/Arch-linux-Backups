[manager]
ratio          = [1, 3, 4]
sort_by        = "natural"
sort_sensitive = false
sort_reverse   = false
sort_dir_first = true
show_hidden    = false
show_symlink   = true
linemode       = "size"
scrolloff      = 5

[preview]
tab_size       = 2
max_width      = 1200
max_height     = 900
cache_dir      = ""
image_filter   = "triangle"
image_quality  = 85

[tasks]
micro_workers    = 10
macro_workers    = 5
bizarre_retry    = 5
image_alloc      = 536870912
image_bound      = [0, 0]
suppress_preload = false

[log]
enabled = false

[opener]
edit = [
  { run = 'kitty --start-as=fullscreen nvim "$@"', orphan = true, desc = "nvim" },
]
view_pdf = [
  { run = 'zathura "$@"', orphan = true, desc = "zathura" },
]
view_image = [
  { run = 'imv -f "$@"', orphan = true, desc = "imv" },
]
view_video = [
  { run = 'mpv --fs "$@"', orphan = true, desc = "mpv" },
]
extract = [
  { run = '/home/xstream/.config/yazi/extract.sh "$@"', orphan = false, desc = "unzip" },
]

[open]
rules = [
  { mime = "inode/x-empty", use = "edit" },
  { url = "*.c",      use = "edit" },
  { url = "*.cpp",    use = "edit" },
  { url = "*.py",     use = "edit" },
  { url = "*.js",     use = "edit" },
  { url = "*.ts",     use = "edit" },
  { url = "*.sh",     use = "edit" },
  { url = "*.md",     use = "edit" },
  { url = "*.toml",   use = "edit" },
  { url = "*.json",   use = "edit" },
  { mime = "text/*",   use = "edit" },
  { url = "*.pdf",    use = "view_pdf" },
  { mime = "application/pdf", use = "view_pdf" },
  { url = "*.mp4",    use = "view_video" },
  { url = "*.mkv",    use = "view_video" },
  { url = "*.avi",    use = "view_video" },
  { url = "*.webm",   use = "view_video" },
  { mime = "application/zip", use = "extract" },
  { mime = "image/*",  use = "view_image" },
  { mime = "video/*",  use = "view_video" },
  { mime = "audio/*",  use = "view_video" },
  { mime = "*", use = "edit" },
]
