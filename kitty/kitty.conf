# Font
font_size 16.0

# Deep black background, full opacity
background_opacity 1.0
dynamic_background_opacity no

# Base colors
foreground              #E0E0E0
background              #000000
selection_foreground    #000000
selection_background    #00FFFF

# Cursor — neon green
cursor                  #00FF00
cursor_text_color       #000000
cursor_trail_decay      0.1 0.4
cursor_trail            3

# Black
color0   #000000
color8   #333333

# Red → neon pink (errors)
color1   #FF007C
color9   #FF3399

# Green → neon lime (success)
color2   #00FF00
color10  #39FF14

# Yellow → neon yellow (warnings)
color3   #FFFF00
color11  #FFE600

# Blue → electric blue
color4   #00BFFF
color12  #00CFFF

# Magenta → neon pink
color5   #FF007C
color13  #FF00AA

# Cyan → neon cyan
color6   #00FFFF
color14  #00FFFF

# White
color7   #FFFFFF
color15  #FFFFFF

detect_urls no
