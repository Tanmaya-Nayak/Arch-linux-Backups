# Font
font_size 16.0
# Deep black background, full opacity
background_opacity 1.0
dynamic_background_opacity no
# Base colors — neon cyan as default text instead of white
foreground              #00FF00
background              #000000
selection_foreground    #000000
selection_background    #FF007C
# Cursor — neon green
cursor                  #00FF00
cursor_text_color       #000000
cursor_trail_decay      0.3 0.9
cursor_trail            2
# Black
color0   #000000
color8   #444444
# Red → neon pink (errors)
color1   #FF007C
color9   #FF3399
# Green → neon lime (success)
color2   #00FF00
color10  #39FF14
# Yellow → neon yellow (warnings)
color3   #FFFF00
color11  #FFE600
# Blue → electric blue
color4   #00FFFF
color12  #33CCFF
# Magenta → neon pink
color5   #FF007C
color13  #FF00AA
# Cyan → neon cyan
color6   #00FFFF
color14  #33FFFF
# White → neon bright white (slightly warm so it pops)
color7   #E0E0E0
color15  #FFFFFF
detect_urls no
allow_remote_control yes
listen_on unix:/tmp/kitty

# Fix backspace in yazi
map backspace send_text all \x08
