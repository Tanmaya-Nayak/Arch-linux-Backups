format = """
[┌─](bold #FF007C)$username$hostname$directory$git_branch$git_status$cmd_duration
[└─❯](bold #00FFFF) """

right_format = ""

[username]
style_user = "bold #FF007C"
style_root = "bold #FF007C"
format = "[$user]($style)"
show_always = false

[hostname]
ssh_only = true
format = "[@$hostname]($style) "
style = "bold #00FFFF"

[directory]
style = "bold #00FF00"
format = "in [$path]($style) "
truncation_length = 3
truncate_to_repo = true

[git_branch]
symbol = " "
style = "bold #FF007C"
format = "on [$symbol$branch]($style) "

[git_status]
style = "bold #00FFFF"
format = "([$all_status$ahead_behind]($style)) "
conflicted = "="
ahead = "⇡${count}"
behind = "⇣${count}"
diverged = "⇕⇡${ahead_count}⇣${behind_count}"
untracked = "?"
stashed = "$"
modified = "!"
staged = "+"
renamed = "»"
deleted = "✘"

[cmd_duration]
min_time = 500
style = "bold #FFFF00"
format = "took [$duration]($style) "

[character]
success_symbol = "[❯](bold #00FF00)"
error_symbol = "[❯](bold #FF0000)"

[c]
symbol = " "
style = "bold #00FFFF"

[python]
symbol = " "
style = "bold #FFFF00"

[nodejs]
symbol = " "
style = "bold #00FF00"

[rust]
symbol = " "
style = "bold #FF007C"
