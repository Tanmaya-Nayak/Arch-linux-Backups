format = """
[┌─](bold #FF007C)$os$username[ in ](bold #FF007C)$hostname$directory$git_branch$git_status$git_metrics$c$python$nodejs$rust$golang$java$docker_context
[└─](bold #00FFFF)$status$jobs$character"""

right_format = """$cmd_duration$time"""

[os]
disabled = false
style = "bold #FF007C"
format = "[$symbol]($style)"

[os.symbols]
Arch = "󰣇 "

[username]
style_user = "bold #FF007C"
style_root = "bold #FF0000"
format = "[$user]($style)"
show_always = true

[hostname]
ssh_only = true
format = "[@$hostname]($style) "
style = "bold #00FFFF"

[directory]
style = "bold #00FF00"
format = "[$path]($style) "
truncation_length = 3
truncate_to_repo = true
read_only = " 󰌾"
read_only_style = "bold #FF0000"

[git_branch]
symbol = " "
style = "bold #FF007C"
format = "on [$symbol$branch]($style) "

[git_status]
style = "bold #00FFFF"
format = "([$all_status$ahead_behind]($style)) "
conflicted = "=${count}"
ahead = "⇡${count}"
behind = "⇣${count}"
diverged = "⇕⇡${ahead_count}⇣${behind_count}"
untracked = "?${count}"
stashed = "*${count}"
modified = "!${count}"
staged = "+${count}"
renamed = "»${count}"
deleted = "✘${count}"

[git_metrics]
disabled = false
added_style = "bold #00FF00"
deleted_style = "bold #FF0000"
format = '([+$added]($added_style) )([-$deleted]($deleted_style) )'

[cmd_duration]
min_time = 500
style = "bold #FFFF00"
format = "took [$duration]($style) "

[time]
disabled = false
time_format = "%H:%M:%S"
style = "bold #00FFFF"
format = "[$time]($style)"

[status]
disabled = false
style = "bold #FF0000"
symbol = "✘ "
success_symbol = ""
format = "[$symbol$status]($style) "

[jobs]
style = "bold #FFFF00"
symbol = "✦"
format = "[$symbol$number]($style) "

[character]
success_symbol = "[❯](bold #00FF00)"
error_symbol = "[❯](bold #FF0000)"
vimcmd_symbol = "[❮](bold #00FFFF)"

[c]
symbol = " "
style = "bold #00FFFF"
format = "via [$symbol$version]($style) "

[python]
symbol = " "
style = "bold #FFFF00"
format = "via [$symbol$version]($style) "

[nodejs]
symbol = " "
style = "bold #00FF00"
format = "via [$symbol$version]($style) "

[rust]
symbol = " "
style = "bold #FF007C"
format = "via [$symbol$version]($style) "

[golang]
symbol = " "
style = "bold #00FFFF"
format = "via [$symbol$version]($style) "

[java]
symbol = " "
style = "bold #FF007C"
format = "via [$symbol$version]($style) "

[docker_context]
symbol = " "
style = "bold #00FFFF"
format = "via [$symbol$context]($style) "

[battery]
full_symbol = "🔋 "
charging_symbol = "⚡️ "
discharging_symbol = "💀 "

[[battery.display]]
threshold = 30
style = "bold #FF0000"
